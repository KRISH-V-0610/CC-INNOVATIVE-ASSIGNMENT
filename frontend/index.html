<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralCloud: Attending Doctor UI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #00695c; border-bottom: 2px solid #e0f2f1; padding-bottom: 10px; }
        .control-panel { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        select, button { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #00897b; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #00695c; }
        .results { display: flex; gap: 20px; margin-top: 20px; }
        .card { flex: 1; background: #e0f2f1; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #b2dfdb;}
        .card h3 { margin: 0 0 10px 0; color: #004d40; }
        .card p { font-size: 24px; font-weight: bold; margin: 0; }
        canvas { background: #fafafa; border: 1px solid #eee; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 NeuralCloud: Real-Time EEG Dashboard</h1>
    <p>Connected to Scalable Cloud Inference Engine</p>

    <div class="control-panel">
        <label for="sampleId">Select Patient Sample ID:</label>
        <select id="sampleId">
            <option value="0">Sample 0</option>
            <option value="12">Sample 12</option>
            <option value="45">Sample 45</option>
            <option value="100">Sample 100</option>
        </select>
        <button onclick="runInference()">Stream & Analyze Data</button>
    </div>

    <!-- The Chart where the brainwave will draw -->
    <canvas id="eegChart" height="100"></canvas>

    <div class="results" id="resultsBox" style="display: none;">
        <div class="card">
            <h3>True Intent</h3>
            <p id="trueIntent">...</p>
        </div>
        <div class="card" id="predCard">
            <h3>Cloud AI Prediction</h3>
            <p id="predIntent">...</p>
            <small id="confidence" style="color: #666;"></small>
        </div>
    </div>
</div>

<script>
    // Initialize empty chart
    const ctx = document.getElementById('eegChart').getContext('2d');
    let chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'EEG Channel 0 Stream (µV)', data: [], borderColor: '#00897b', borderWidth: 2, pointRadius: 0, tension: 0.2 }] },
        options: { animation: false, scales: { y: { min: -100, max: 100 } } }
    });

    // Replace this URL with your Render URL later!
    const API_BASE_URL = "https://cc-innovative-assignment.onrender.com"; 

    async function runInference() {
        const sampleId = document.getElementById('sampleId').value;
        const resultsBox = document.getElementById('resultsBox');
        
        resultsBox.style.display = 'none';
        
        try {
            // 1. Fetch data from your Python API
            const response = await fetch(`${API_BASE_URL}/api/predict/${sampleId}`);
            const data = await response.json();

            // 2. Simulate the real-time "Streaming" effect
            const signal = data.signal_data;
            chart.data.labels = [];
            chart.data.datasets[0].data = [];
            let i = 0;

            const streamInterval = setInterval(() => {
                if (i >= signal.length) {
                    clearInterval(streamInterval);
                    
                    // 3. Show Final Results when stream finishes
                    document.getElementById('trueIntent').innerText = data.true_intent;
                    document.getElementById('predIntent').innerText = data.predicted_intent;
                    document.getElementById('confidence').innerText = "Confidence: " + data.confidence;
                    
                    const predCard = document.getElementById('predCard');
                    if (data.true_intent === data.predicted_intent) {
                        predCard.style.backgroundColor = "#c8e6c9"; // Match
                        predCard.style.borderColor = "#81c784";
                    } else {
                        predCard.style.backgroundColor = "#ffcdd2"; // Error
                        predCard.style.borderColor = "#e57373";
                    }
                    resultsBox.style.display = 'flex';
                    return;
                }
                
                // Push 20 data points at a time to animate the chart
                for(let step = 0; step < 20 && i < signal.length; step++, i++) {
                    chart.data.labels.push(i);
                    chart.data.datasets[0].data.push(signal[i]);
                }
                chart.update();
            }, 50);

        } catch (error) {
            alert("Could not connect to Cloud API. Is the server running?");
            console.error(error);
        }
    }
</script>

</body>
</html>
